<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- HumTech PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00E6FF">
    <meta name="background-color" content="#0A0F1C">
    <link rel="icon" type="image/svg+xml" href="/assets/logo/humtech-favicon.svg">
    <link rel="apple-touch-icon" href="/assets/logo/pwa/humtech-192.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HumTech">

    <title>HumTech</title>

    <!-- Basic styling -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0A0F1C;
            color: #E8F4FF;
            font-family: Inter, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            letter-spacing: 3px;
            color: #00E6FF;
            text-shadow: 0 0 12px #00E6FF;
            margin: 0;
        }

        p {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .tagline {
            font-family: "Roboto Mono", monospace;
            color: #A8B4C4;
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <!-- HumTech Logo Lockup -->
    <img src="/assets/logo/humtech-lockup-dark.svg" class="logo" alt="HumTech Logo">

    <h1>HUMTECH</h1>
    <p class="tagline">HUMAN‑DRIVEN TECHNOLOGY</p>

</body>
</html>
